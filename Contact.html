    <script>
        const icons = document.querySelectorAll('.contact-icon');
        const infoDisplay = document.getElementById('contactInfoDisplay');

        // Rotate all icons by default
        icons.forEach(icon => {
            icon.classList.add('rotate-icon');
        });

        icons.forEach(icon => {
            icon.addEventListener('mouseover', () => {
                // Stop rotating for the hovered icon
                icon.classList.remove('rotate-icon');
                infoDisplay.textContent = icon.getAttribute('data-info');
                infoDisplay.style.display = 'block';
            });

            icon.addEventListener('mouseout', () => {
                // Resume rotation for the hovered icon
                icon.classList.add('rotate-icon');
                infoDisplay.style.display = 'none';
            });
        });
    </script>
